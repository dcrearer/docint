<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="750" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#232f3e">Document Intelligence Service — Architecture</text>

  <!-- ===== CLIENT SECTION ===== -->
  <rect x="30" y="55" width="160" height="120" rx="8" fill="#232f3e" filter="url(#shadow)"/>
  <text x="110" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">CLI Client</text>
  <text x="110" y="105" text-anchor="middle" font-size="10" fill="#adb5bd">docint-cli (Rust)</text>
  <text x="110" y="125" text-anchor="middle" font-size="9" fill="#8899aa">--chat / --actor</text>
  <text x="110" y="140" text-anchor="middle" font-size="9" fill="#8899aa">session_id / actor_id</text>
  <text x="110" y="155" text-anchor="middle" font-size="9" fill="#8899aa">SSE streaming</text>

  <!-- Arrow: CLI → AgentCore Runtime -->
  <line x1="190" y1="115" x2="270" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="108" text-anchor="middle" font-size="8" fill="#666">invoke</text>

  <!-- ===== AGENTCORE RUNTIME ===== -->
  <rect x="280" y="55" width="240" height="145" rx="8" fill="#ff9900" filter="url(#shadow)"/>
  <text x="400" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">AgentCore Runtime</text>
  <text x="400" y="98" text-anchor="middle" font-size="10" fill="#fff3e0">Strands Agent (Claude Haiku)</text>
  <text x="400" y="116" text-anchor="middle" font-size="10" fill="#fff3e0">ARM64 Container</text>
  <rect x="300" y="128" width="200" height="28" rx="4" fill="#e68a00"/>
  <text x="400" y="147" text-anchor="middle" font-size="10" fill="#fff">MCP Client → Gateway</text>
  <rect x="300" y="162" width="200" height="28" rx="4" fill="#e68a00"/>
  <text x="400" y="181" text-anchor="middle" font-size="10" fill="#fff">Memory SessionManager</text>

  <!-- ===== AGENTCORE MEMORY ===== -->
  <rect x="580" y="55" width="200" height="100" rx="8" fill="#8c4fff" filter="url(#shadow)"/>
  <text x="680" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">AgentCore Memory</text>
  <text x="680" y="100" text-anchor="middle" font-size="9" fill="#e0d4ff">Semantic · Summary · Preferences</text>
  <text x="680" y="116" text-anchor="middle" font-size="9" fill="#e0d4ff">Cross-session recall</text>
  <text x="680" y="132" text-anchor="middle" font-size="9" fill="#e0d4ff">30-day event expiry</text>

  <!-- Arrow: Runtime → Memory -->
  <line x1="520" y1="100" x2="575" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="548" y="93" text-anchor="middle" font-size="8" fill="#666">events</text>

  <!-- ===== MCP GATEWAY ===== -->
  <rect x="280" y="240" width="240" height="80" rx="8" fill="#1a73e8" filter="url(#shadow)"/>
  <text x="400" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">AgentCore Gateway</text>
  <text x="400" y="288" text-anchor="middle" font-size="10" fill="#bbdefb">MCP Protocol · SigV4 Auth</text>
  <text x="400" y="305" text-anchor="middle" font-size="9" fill="#90caf9">Tool targets → Lambda functions</text>

  <!-- Arrow: Runtime → Gateway -->
  <line x1="400" y1="200" x2="400" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="220" font-size="8" fill="#666">MCP</text>

  <!-- ===== LAMBDA FUNCTIONS ===== -->
  <rect x="30" y="370" width="740" height="110" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="395" font-size="12" font-weight="bold" fill="#232f3e">Lambda Functions (Rust · ARM64 · PROVIDED_AL2023)</text>

  <!-- Search -->
  <rect x="50" y="410" width="155" height="55" rx="6" fill="#0d6efd" filter="url(#shadow)"/>
  <text x="128" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">search</text>
  <text x="128" y="450" text-anchor="middle" font-size="9" fill="#cfe2ff">Hybrid RRF</text>

  <!-- Metadata -->
  <rect x="220" y="410" width="155" height="55" rx="6" fill="#0d6efd" filter="url(#shadow)"/>
  <text x="298" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">metadata</text>
  <text x="298" y="450" text-anchor="middle" font-size="9" fill="#cfe2ff">List / Get docs</text>

  <!-- Compare -->
  <rect x="390" y="410" width="155" height="55" rx="6" fill="#0d6efd" filter="url(#shadow)"/>
  <text x="468" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">compare</text>
  <text x="468" y="450" text-anchor="middle" font-size="9" fill="#cfe2ff">Side-by-side</text>

  <!-- Ingest -->
  <rect x="560" y="410" width="195" height="55" rx="6" fill="#198754" filter="url(#shadow)"/>
  <text x="658" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ingest</text>
  <text x="658" y="450" text-anchor="middle" font-size="9" fill="#d1e7dd">S3 events · tenant-from-key</text>

  <!-- Arrows: Gateway → Lambdas -->
  <line x1="340" y1="320" x2="128" y2="405" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="380" y1="320" x2="298" y2="405" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="420" y1="320" x2="468" y2="405" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== S3 BUCKET ===== -->
  <rect x="830" y="370" width="230" height="110" rx="8" fill="#198754" filter="url(#shadow)"/>
  <text x="945" y="400" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">S3 Document Bucket</text>
  <text x="945" y="420" text-anchor="middle" font-size="10" fill="#d1e7dd">Auto-ingest on upload</text>
  <text x="945" y="440" text-anchor="middle" font-size="9" fill="#a3cfbb">tenant-1/docs/file.md</text>
  <text x="945" y="455" text-anchor="middle" font-size="9" fill="#a3cfbb">tenant-2/notes/meeting.md</text>
  <text x="945" y="470" text-anchor="middle" font-size="9" fill="#a3cfbb">.txt .md .csv .json .html .xml</text>

  <!-- Arrow: S3 → Ingest Lambda -->
  <line x1="825" y1="435" x2="760" y2="435" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="793" y="428" text-anchor="middle" font-size="8" fill="#666">event</text>

  <!-- ===== DATABASE ===== -->
  <rect x="30" y="530" width="400" height="110" rx="8" fill="#6f42c1" filter="url(#shadow)"/>
  <text x="230" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Aurora Serverless v2 (PostgreSQL + pgvector)</text>
  <text x="230" y="580" text-anchor="middle" font-size="10" fill="#e0cffc">Vector similarity (cosine) + Full-text search</text>
  <text x="230" y="598" text-anchor="middle" font-size="10" fill="#e0cffc">Reciprocal Rank Fusion (RRF)</text>
  <text x="230" y="616" text-anchor="middle" font-size="10" fill="#e0cffc">Row-Level Security (tenant isolation)</text>
  <text x="230" y="632" text-anchor="middle" font-size="9" fill="#c9b3f5">VPC Endpoints (no NAT)</text>

  <!-- Arrow: Lambdas → DB -->
  <line x1="230" y1="480" x2="230" y2="525" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== BEDROCK ===== -->
  <rect x="500" y="530" width="250" height="110" rx="8" fill="#d63384" filter="url(#shadow)"/>
  <text x="625" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Amazon Bedrock</text>
  <rect x="520" y="570" width="210" height="28" rx="4" fill="#b02a6e"/>
  <text x="625" y="589" text-anchor="middle" font-size="10" fill="#fff">Claude Haiku 4.5 (reasoning)</text>
  <rect x="520" y="604" width="210" height="28" rx="4" fill="#b02a6e"/>
  <text x="625" y="623" text-anchor="middle" font-size="10" fill="#fff">Titan Embed v2 (1024-dim)</text>

  <!-- Arrow: Lambdas → Bedrock (embeddings) -->
  <line x1="500" y1="480" x2="580" y2="525" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="525" y="500" font-size="8" fill="#666">embed</text>

  <!-- Arrow: Runtime → Bedrock (LLM) -->
  <line x1="520" y1="200" x2="625" y2="525" stroke="#555" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow)"/>

  <!-- ===== MONITORING ===== -->
  <rect x="830" y="530" width="230" height="110" rx="8" fill="#fd7e14" filter="url(#shadow)"/>
  <text x="945" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Observability</text>
  <text x="945" y="580" text-anchor="middle" font-size="10" fill="#fff3e0">CloudWatch Dashboard</text>
  <text x="945" y="598" text-anchor="middle" font-size="10" fill="#fff3e0">Lambda Metrics + Alarms</text>
  <text x="945" y="616" text-anchor="middle" font-size="10" fill="#fff3e0">Runtime Logs</text>

  <!-- ===== CI/CD ===== -->
  <rect x="830" y="55" width="230" height="100" rx="8" fill="#232f3e" filter="url(#shadow)"/>
  <text x="945" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">CI/CD</text>
  <text x="945" y="100" text-anchor="middle" font-size="10" fill="#adb5bd">GitHub Actions</text>
  <text x="945" y="118" text-anchor="middle" font-size="9" fill="#8899aa">cargo test → cargo lambda build</text>
  <text x="945" y="133" text-anchor="middle" font-size="9" fill="#8899aa">→ Docker build → cdk deploy</text>

  <!-- Footer -->
  <text x="550" y="730" text-anchor="middle" font-size="10" fill="#999">docint — Document Intelligence Service · Multi-tenant RAG with Conversational Memory</text>
</svg>
