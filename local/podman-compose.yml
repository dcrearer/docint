services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: docint-postgres
    environment:
      POSTGRES_DB: docint
      POSTGRES_USER: docint
      POSTGRES_PASSWORD: docint_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docint"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
